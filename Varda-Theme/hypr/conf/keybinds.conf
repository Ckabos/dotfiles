# See https://wiki.hyprland.org/Configuring/Keywords/ for more
$mainMod = SUPER
# Definir la ruta del panel
$okpanel = /home/efrain/OkPanel/bin/okpanel

# General
bind = $mainMod, Q, killactive,
bind = $mainMod ALT, R, exec, $okpanel quit; $okpanel run &
bind = $mainMod ALT, Q, exit
bind = $mainMod SHIFT, space, togglefloating

# bind = $mainMod, return, exec, uwsm app -- kitty --session fastfetch.session
bind = $mainMod, return, exec, kitty
bind = $mainMod ALT, return, exec, uwsm app -- kitty --session dashboard.session
bind = $mainMod ALT, y, exec, uwsm app -- yazi-kitty.sh
bind = $mainMod ALT, b, exec, uwsm app -- kitty -e btop
# bind = $mainMod, M, exec, uwsm stop,
bind = $mainMod, M, cyclenext
bind = $mainMod, P, pseudo, # dwindle
bind = $mainMod, I, togglesplit, # dwindle

bind = $mainMod, F, fullscreen, 1
bind = $mainMod SHIFT, F, fullscreen, 0       # Maximizar (Estilo Monocle: Mantiene barras)
bind = $mainMod, E, exec, nautilus
bind = $mainMod, R, exec, kitty -e yazi
bind = $mainMod, V, exec, $okpanel clipboard
bind = $mainMod, N, exec, $okpanel notification
bind = $mainMod, period, exec, ags request -i OkPanel "emojis"
# bind = $mainMod, T, exec, ~/.config/hypr/scripts/move_window_monitor.sh
bind = $mainMod, T, exec, ~/.config/hypr/scripts/swap_workspace.sh

# ======================
# Bloqueo de Pantalla
# ======================
bind = CONTROL ALT, Delete, exec, hyprlock

# # Scroll through workspaces
bind = $mainMod, mouse_down, workspace, r-1
bind = $mainMod, mouse_up, workspace, r+1
# bind = $mainMod, kp_down, workspace, r+1
# bind = $mainMod, kp_up, workspace, r-1
# bind = $mainMod, down, workspace, r+1
# bind = $mainMod, up, workspace, r-1
# bind = $mainMod, next, workspace, r+1
# bind = $mainMod, prior, workspace, r-1
# bind = , next, workspace, r+1
# bind = , prior, workspace, r-1
# bind = $mainMod, j, workspace, r+1
# bind = $mainMod, k, workspace, r-1


# ======================
# 4. Mover Ventanas (Swap)
# ======================
# --- FLECHAS ---
bind = $mainMod, Left, movefocus, l
bind = $mainMod, Right, movefocus, r
bind = $mainMod, Up, movefocus, u
bind = $mainMod, Down, movefocus, d

# --- VIM KEYS (HJKL) ---
bind = $mainMod, H, movefocus, l
bind = $mainMod, L, movefocus, r
bind = $mainMod, K, movefocus, u
bind = $mainMod, J, movefocus, d

# ======================
# 3. Foco y Movimiento (Direccional)
# ======================

# --- FLECHAS ---
bind = $mainMod SHIFT, Left, movewindow, l
bind = $mainMod SHIFT, Right, movewindow, r
bind = $mainMod SHIFT, Up, movewindow, u
bind = $mainMod SHIFT, Down, movewindow, d

# --- VIM KEYS (HJKL) ---
bind = $mainMod SHIFT, H, movewindow, l
bind = $mainMod SHIFT, L, movewindow, r
bind = $mainMod SHIFT, K, movewindow, u
bind = $mainMod SHIFT, J, movewindow, d


# ======================
# 5. Redimensionar (Resize)
# ======================
# Usamos CONTROL para evitar conflictos con menús de apps
bind = $mainMod CONTROL, Left, resizeactive, -50 0
bind = $mainMod CONTROL, Right, resizeactive, 50 0
bind = $mainMod CONTROL, Up, resizeactive, 0 -50
bind = $mainMod CONTROL, Down, resizeactive, 0 50

# Resize con Vim Keys
bind = $mainMod CONTROL, H, resizeactive, -50 0
bind = $mainMod CONTROL, L, resizeactive, 50 0
bind = $mainMod CONTROL, K, resizeactive, 0 -50
bind = $mainMod CONTROL, J, resizeactive, 0 50

# Ajuste fino (para ventanas flotantes)
bind = $mainMod ALT, Left, moveactive, -50 0
bind = $mainMod ALT, Right, moveactive, 50 0
bind = $mainMod ALT, Up, moveactive, 0 -50
bind = $mainMod ALT, Down, moveactive, 0 50


bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

# Groups
# bind = $mainMod, g, togglegroup
# bind = $mainMod, Tab, changegroupactive
# bind = $mainMod, l, lockactivegroup, toggle

# Move/resize windows with mainMod + LMB/RMB and dragging
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow
bindm = $mainMod ALT, mouse:272, resizewindow

# launcher
bind = , $mainMod ESCAPE, exec, $HOME/OkPanel/bin/okpanel launcher


# Volume and Media
bindl = , XF86AudioRaiseVolume, exec, $HOME/OkPanel/bin/okpanel volume-up
bindl = , XF86AudioLowerVolume, exec, $HOME/OkPanel/bin/okpanel volume-down
bindl = , XF86AudioMute, exec, $HOME/OkPanel/bin/okpanel mute
bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = , XF86AudioNext, exec, playerctl next
bindl = , XF86AudioPrev, exec, playerctl previous

# Launcher
bind = $mainMod, D, exec, $HOME/OkPanel/bin/okpanel launcher

# Programas
bind = $mainMod, A, exec, $HOME/OkPanel/bin/okpanel menu

# Calendario
bind = $mainMod, C, exec, $HOME/OkPanel/bin/okpanel calendar

# Screenshots
bind = , print, exec, $HOME/OkPanel/bin/okpanel screenshot

# Brightness
bindl = , XF86MonBrightnessUp, exec, $HOME/.config/hypr/scripts/brightness/changeBrightness.sh increase
bindl = , XF86MonBrightnessDown, exec, $HOME/.config/hypr/scripts/brightness/changeBrightness.sh decrease
