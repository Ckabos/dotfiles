# ------------------------------
# OkPanel (AGS Layer Rules)
# ------------------------------

# 1. El marco principal de la barra
layerrule = blur on, match:namespace ^(frame)$
layerrule = ignore_alpha 0, match:namespace ^(frame)$

# 2. El menú del sistema / app launcher
layerrule = blur on, match:namespace ^(menu)$
layerrule = ignore_alpha 0, match:namespace ^(menu)$

# 3. El calendario
layerrule = blur on, match:namespace ^(calendar)$
layerrule = ignore_alpha 0, match:namespace ^(calendar)$

# 4. Las notificaciones
layerrule = blur on, match:namespace ^(notificationPopups)$
layerrule = ignore_alpha 0, match:namespace ^(notificationPopups)$

# 5. Las alertas (volumen, brillo)
layerrule = blur on, match:namespace ^(volumeAlert)$
layerrule = ignore_alpha 0, match:namespace ^(volumeAlert)$
layerrule = blur on, match:namespace ^(brightnessAlert)$
layerrule = ignore_alpha 0, match:namespace ^(brightnessAlert)$

# 6. Regla general por si AGS usa el nombre de la instancia
layerrule = blur on, match:namespace ^(OkPanel)$
layerrule = ignore_alpha 0, match:namespace ^(OkPanel)$
