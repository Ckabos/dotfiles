# =========================================================
# WINDOWRULES – Hyprland (SINTAXIS NUEVA)
# =========================================================

# ------------------------------
# Polkit (autenticación)
# ------------------------------
windowrule = match:class ^(polkit-gnome-authentication-agent-1)$, float on
windowrule = match:class ^(polkit-gnome-authentication-agent-1)$, stay_focused on
windowrule = match:class ^(polkit-gnome-authentication-agent-1)$, no_anim on
windowrule = match:class ^(polkit-gnome-authentication-agent-1)$, border_size 0
windowrule = match:class ^(polkit-gnome-authentication-agent-1)$, decorate off

# ------------------------------
# Zathura
# ------------------------------
windowrule = match:class ^(org\.pwmt\.zathura)$, opacity 1.0 0.70

# ------------------------------
# Calculadora GNOME
# ------------------------------
windowrule = match:class ^(org\.gnome\.Calculator|gnome-calculator)$, float on

# ------------------------------
# Pulsemixer / nmtui / bluetuith
# ------------------------------
windowrule = match:title ^(pulsemixer|nmtui|bluetuith)$, float on
windowrule = match:title ^(pulsemixer|nmtui|bluetuith)$, move 1410 62
windowrule = match:title ^(pulsemixer|nmtui|bluetuith)$, pin on

# ------------------------------
# Picture-in-Picture
# ------------------------------
windowrule = match:title ^(Picture-in-Picture)$, float on
windowrule = match:title ^(Picture-in-Picture)$, move 1492 839
windowrule = match:title ^(Picture-in-Picture)$, size 427 240
windowrule = match:title ^(Picture-in-Picture)$, pin on

# ------------------------------
# Kitty floating y Clipse
# ------------------------------
windowrule = match:class ^(kitty-floating|clipse)$, float on
windowrule = match:class ^(clipse)$, size 652 652

# ------------------------------
# Kooha (grabador de pantalla)
# ------------------------------
windowrule = match:class ^(io\.github\.seadve\.Kooha)$, float on

# Regla para centrar la ventana
windowrule = match:class ^(spotify-queue-window)$, float on
windowrule = match:class ^(spotify-queue-window)$ center
windowrule = match:class ^(spotify-queue-window)$ size 400 200

# =========================================================
# ASIGNACIÓN DE WORKSPACES
# (sin silent = te lleva | con silent = no interrumpe)
# =========================================================

# W1 – Terminales (TE LLEVA)
windowrule = match:class ^(URxvt|Alacritty|kitty)$, workspace 1

# W2 – Navegadores (TE LLEVA)
windowrule = match:class ^(firefox|Opera|Brave-browser|brave-browser|Google-chrome|google-chrome|chromium|Chromium|floorp|librewolf|qutebrowser|org\.qutebrowser\.qutebrowser)$, opacity 0.90 0.90
windowrule = match:class ^(firefox|Opera|Brave-browser|brave-browser|Google-chrome|google-chrome|chromium|Chromium|floorp|librewolf|qutebrowser|org\.qutebrowser\.qutebrowser)$, workspace 2

# W3 – Gestores de archivos (TE LLEVA)
windowrule = match:class ^(org\.gnome\.Nautilus|Nemo|Pcmanfm|pcmanfm|pcmanfm-qt|ranger|thunar|Thunar)$, opacity 0.90 0.90
windowrule = match:class ^(org\.gnome\.Nautilus|Nemo|Pcmanfm|pcmanfm|pcmanfm-qt|ranger|thunar|Thunar)$, workspace 3

# W4 – Multimedia (SILENT)
windowrule = match:class ^(Spotify|spotify|Spotube|mpv|Youtube|yuna|vlc|Vlc|celluloid|Celluloid)$, opacity 0.80 0.80
windowrule = match:class ^(Spotify|spotify|Spotube|mpv|Youtube|yuna|vlc|Vlc|celluloid|Celluloid)$, workspace 4 silent
windowrule = match:class ^(qtws)$, workspace 4 silent
windowrule = match:class ^(qtws)$, fullscreen on

# W5 – IDEs / Dev (TE LLEVA)
windowrule = match:class ^(Code|code|code-oss|VSCodium|codium|Java|Eclipse|Apache\ NetBeans\ IDE\ 12\.4|wireshark|org\.wireshark\.Wireshark)$, workspace 5
windowrule = match:class ^(Java|Eclipse)$, fullscreen on

# W6 – Mensajería (SILENT)
windowrule = match:class ^(discord|Discord|vesktop|org\.telegram\.desktop|Whatsapp-for-linux|Caprine|Signal|org\.gabmus\.giara|Wasistlos|whatsdesk)$, opacity 0.80 0.80
windowrule = match:class ^(discord|Discord|vesktop|org\.telegram\.desktop|Whatsapp-for-linux|Caprine|Signal|org\.gabmus\.giara|Wasistlos|whatsdesk)$, workspace 6 silent

# W7 – Documentos / PDFs (TE LLEVA)
windowrule = match:class ^(Wpspdf|pdf|wps|et|wpp|Zathura|okular|obsidian|Bless|org\.gnome\.GHex|org\.pwmt\.zathura|net\.code-industry\.masterpdfeditor5|MasterPDFEditor)$, workspace 7

# W8 – Sistema / Utilidades (SILENT)
windowrule = match:class ^(MEGAsync|Transmission-gtk|System-config-printer\.py|obs|Protonvpn-gui|BlueMail|scrcpy|Alarm-clock-applet|Blueberry\.py|Lxappearance|kdeconnect\.app|kdeconnect-settings|kdeconnect-indicator|kdeconnect\.sms|kdeconnect\.daemon|Pavucontrol|Nitrogen|Flash_tool|Gnome-screenshot|copyq|arandr|org\.pulseaudio\.pavucontrol|blueman-manager|org\.qbittorrent\.qBittorrent|cheese|qbittorrent)$, workspace 8 silent
windowrule = match:class ^(MEGAsync|Transmission-gtk|System-config-printer\.py|Protonvpn-gui|BlueMail|scrcpy|Gnome-screenshot|kdeconnect\.daemon)$, float on

# W9 – Reuniones (TE LLEVA)

# Eliminamos la regla por title que tenías antes y usamos class para mayor precisión
windowrule = match:class ^(teams-for-linux|zoom|gucharmap|Genymotion|ghidra-Ghidra|outlook-for-linux)$, workspace 9
windowrule = match:class ^(teams-for-linux|outlook-for-linux)$, opacity 0.85 0.85


# W10 – Juegos / Educación (TE LLEVA)
windowrule = match:class ^(OpenBoard|EdrawMax|kolourpaint|Qalculate-gtk|GeoGebra|CrossCode|SkullGirls|Cyber\ Shadow|pyrogenesis|ktouch|burp-StartBurp|jetbrains-studio|PacketTracer|org\.wireshark\.Wireshark|Postman|NecroDancer\.x64|Caido|VirtualBox\ Manager)$, workspace 10
windowrule = match:class ^(GeoGebra|CrossCode|SkullGirls|Cyber\ Shadow|pyrogenesis)$, fullscreen on

