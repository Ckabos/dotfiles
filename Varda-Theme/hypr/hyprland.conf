# =============================================================================
# HYPRLAND MAIN CONFIGURATION
# Usuario: Efrain (Ckabos)
# Sistema: Arch Linux | Compositor: Hyprland
# =============================================================================

# -----------------------------------------------------------------------------
# 1. MODULARIDAD (Imports)
# Separación de responsabilidades para un mantenimiento limpio.
# -----------------------------------------------------------------------------
source= $HOME/.config/hypr/conf/monitors.conf      # Configuración de resolución y posición de pantallas
source= $HOME/.config/hypr/conf/environment.conf   # Variables de entorno (QT, GTK, XDG)
source= $HOME/.config/hypr/conf/workspaces.conf    # Reglas y nombres de áreas de trabajo
source= $HOME/.config/hypr/conf/keybinds.conf      # Atajos de teclado (Keybindings)
source= $HOME/.config/hypr/conf/input.conf         # Configuración global de teclado y touchpad
source= $HOME/.config/hypr/conf/windowRules.conf   # Reglas específicas para ventanas (Floating, Opacity)
source= $HOME/.config/hypr/conf/theme.conf         # Colores de bordes y estética visual
source= $HOME/.config/hypr/conf/layerRules.conf    # Reglas para capas (Blur en paneles, notificaciones)

# -----------------------------------------------------------------------------
# 2. AUTO-START (Servicios de Sesión)
# -----------------------------------------------------------------------------

# Inicialización del bus de mensajes y variables de entorno para Wayland/Systemd
exec-once=dbus-update-activation-environment --systemd --all
exec-once=systemctl --user import-environment WAYLAND_DISPLAY XDG_CURRENT_DESKTOP

# Estética y Feedback auditivo al iniciar
exec-once=$HOME/Varda-Theme/themes/setCursor.sh
exec-once=play $HOME/.config/hypr/assets/sounds/desktop-login.oga

# Ejecutar el monitor de texto
exec-once = wl-paste --type text --watch cliphist store 

# Ejecutar el monitor de imágenes
exec-once = wl-paste --type image --watch cliphist store

# -----------------------------------------------------------------------------
# 3. APLICACIONES DE ARRANQUE (Vía UWSM)
# UWSM gestiona el ciclo de vida de las apps para mejorar la estabilidad.
# -----------------------------------------------------------------------------
exec-once=uwsm app -- $HOME/.config/hypr/scripts/launchers/firefoxHomePageServer.sh
exec-once=uwsm app -- $HOME/OkPanel/bin/okpanel run            # Panel principal (AGS)
exec-once=uwsm app -- udiskie -anT                             # Montado automático de discos USB
exec-once=uwsm app -- syncthing                                # Sincronización de archivos en la nube
exec-once=uwsm app -- polkit-gnome-authentication-agent-1.desktop # Agente de autenticación (root)
exec-once=uwsm app -- hypridle                                 # Mayordomo de inactividad (Autolock)

# -----------------------------------------------------------------------------
# 4. CONFIGURACIÓN DE DISPOSITIVOS ESPECÍFICOS
# Ajustes de sensibilidad por hardware.
# -----------------------------------------------------------------------------
device {
    name = logitech-usb-receiver
    sensitivity = -0.3
}

device {
    name = e-signal-usb-gaming-mouse
    sensitivity = -0.8
}

# -----------------------------------------------------------------------------
# 5. GESTOS Y NAVEGACIÓN
# -----------------------------------------------------------------------------
gestures {
    gesture = 3, vertical, workspace # Cambiar de escritorio con 3 dedos verticalmente
    workspace_swipe_invert = false
}

general {
    gaps_in = 2                      # Espacio entre ventanas
    gaps_out = 1 		     # Espacio entre ventanas y borde del monitor
    border_size = 2
    layout = dwindle                 # Algoritmo de organización (espiral)
}

cursor {
    warp_on_change_workspace = true  # Mueve el cursor al centro al cambiar de escritorio
    no_warps = false
}

group {
    groupbar {
        font_family = JetBrainsMonoNerdFontMono-Regular
        font_size = 10
    }
}

# -----------------------------------------------------------------------------
# 6. DECORACIÓN Y ESTÉTICA
# -----------------------------------------------------------------------------
decoration {
    rounding = 8
    active_opacity = 1
    inactive_opacity = 1
    
    blur {
        enabled = true
        size = 10
        passes = 5                   # Cantidad de pases para un blur más suave
        xray = false                 # Si es true, ve a través de las ventanas flotantes
    }
    
    shadow {
        enabled = false
    }
}

# -----------------------------------------------------------------------------
# 7. ANIMACIONES
# -----------------------------------------------------------------------------
animations {
    enabled = yes

    # Definición de curvas Bezier personalizadas
    bezier = myBezier, 0.05, 0.9, 0.1, 1
    bezier = workspaceBez, 0.61, 1, 0.88, 1

    # Aplicación de animaciones a elementos
    animation = windows, 1, 7, myBezier
    animation = border, 1, 10, default
    animation = fade, 1, 7, default
    animation = workspaces, 1, 3, workspaceBez, slidevert # Cambio de escritorio vertical
}

# -----------------------------------------------------------------------------
# 8. COMPORTAMIENTO DEL SISTEMA (Misc)
# -----------------------------------------------------------------------------
misc {
    focus_on_activate = true         # Da el foco a apps que piden atención (ej. un link abierto)
    disable_hyprland_logo = true     # Limpia el fondo al iniciar
    disable_hyprland_guiutils_check = true
    enable_anr_dialog = false        # Desactiva diálogo de "App no responde"
}

# Configuración del layout Dwindle (Inspirado en BSPWM)
dwindle {
    pseudotile = yes                 # Permite ventanas con tamaño "falso" (P)
    preserve_split = yes             # Mantiene la dirección del split al mover ventanas
}

# Soporte para aplicaciones X11 heredadas
xwayland {
    force_zero_scaling = true        # Evita borrosidad en apps X11 con HiDPI
}

# Configuración de notificaciones del ecosistema Hypr
ecosystem {
    no_update_news = true
    no_donation_nag = true
}
